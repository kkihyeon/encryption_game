<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLOR CRYPTO: Advanced Tactical Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+KR:wght@300;500;700&display=swap');
        :root {
            --m1: #ef4444; --m2: #3b82f6; --m3: #22c55e; --m4: #eab308;
            --bg: #0d0d15;
        }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg);
            color: white;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.03) 0%, transparent 70%);
        }
        .cyber-font { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* 암호화 방식별 네온 효과 */
        .btn-m1 { border-color: var(--m1); color: var(--m1); } .btn-m1.active { background: var(--m1); color: black; box-shadow: 0 0 15px var(--m1); }
        .btn-m2 { border-color: var(--m2); color: var(--m2); } .btn-m2.active { background: var(--m2); color: black; box-shadow: 0 0 15px var(--m2); }
        .btn-m3 { border-color: var(--m3); color: var(--m3); } .btn-m3.active { background: var(--m3); color: black; box-shadow: 0 0 15px var(--m3); }
        .btn-m4 { border-color: var(--m4); color: var(--m4); } .btn-m4.active { background: var(--m4); color: black; box-shadow: 0 0 15px var(--m4); }

        canvas { cursor: crosshair; touch-action: none; }
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center">

    <div id="lobby" class="w-full max-w-md p-8 glass rounded-3xl text-center space-y-6 z-50">
        <h1 class="text-4xl font-black cyber-font italic text-cyan-400">COLOR CRYPTO</h1>
        <div class="space-y-4">
            <input id="user-nick" type="text" placeholder="NICKNAME" class="w-full bg-black/40 border border-white/20 p-3 rounded-xl text-center cyber-font">
            <input id="room-id" type="text" placeholder="ROOM CODE" class="w-full bg-black/40 border border-white/20 p-3 rounded-xl text-center cyber-font uppercase tracking-widest">
            <button id="btn-enter" class="w-full py-4 bg-cyan-500 text-black font-bold rounded-xl hover:scale-105 transition-transform">INITIALIZE SYSTEM</button>
        </div>
    </div>

    <div id="game-ui" class="hidden w-full h-full max-w-7xl p-4 flex flex-col gap-4">
        
        <div class="h-20 flex justify-between items-center glass rounded-2xl px-8 border-b-2 border-cyan-500/50">
            <div class="flex gap-8">
                <div class="text-center">
                    <p class="text-[10px] text-red-500 font-bold">ATTACKERS</p>
                    <p id="score-attack" class="text-3xl cyber-font">0</p>
                </div>
                <div class="text-center">
                    <p class="text-[10px] text-blue-500 font-bold">DEFENDERS</p>
                    <p id="score-defense" class="text-3xl cyber-font">0</p>
                </div>
            </div>
            
            <div class="text-center">
                <div id="round-info" class="text-xs text-gray-400 cyber-font">ROUND 1 / 5</div>
                <div id="timer-display" class="text-4xl font-bold cyber-font text-cyan-400">00:30</div>
            </div>

            <div id="my-info" class="flex items-center gap-3">
                <div class="text-right">
                    <p id="my-nick" class="text-sm font-bold">Player</p>
                    <p id="my-role" class="text-[10px] text-gray-400 uppercase">Observer</p>
                </div>
                <div id="role-indicator" class="w-3 h-3 rounded-full bg-gray-500"></div>
            </div>
        </div>

        <div class="flex-1 grid grid-cols-12 gap-4 overflow-hidden">
            
            <div class="col-span-2 glass rounded-2xl p-4 space-y-4">
                <h3 class="text-xs font-bold text-gray-500 cyber-font border-b border-white/10 pb-2">ACTIVE AGENTS</h3>
                <div id="player-list" class="space-y-2 text-sm"></div>
            </div>

            <div class="col-span-7 glass rounded-2xl relative group overflow-hidden bg-slate-900/50">
                <div class="absolute top-4 left-1/2 -translate-x-1/2 z-10 flex gap-2">
                    <button onclick="setTool('draw')" class="px-3 py-1 bg-white/10 hover:bg-white/20 rounded text-xs">DRAW</button>
                    <button onclick="setTool('erase')" class="px-3 py-1 bg-white/10 hover:bg-white/20 rounded text-xs">ERASE</button>
                    <button onclick="clearCanvas()" class="px-3 py-1 bg-red-500/20 hover:bg-red-500/40 rounded text-xs">CLEAR</button>
                </div>
                <canvas id="shared-canvas" class="w-full h-full"></canvas>
                <div id="overlay-msg" class="absolute inset-0 flex items-center justify-center pointer-events-none">
                    <div class="text-center bg-black/60 p-6 rounded-2xl backdrop-blur-sm border border-white/10">
                        <p id="display-label" class="text-[10px] text-cyan-400 cyber-font mb-2">INTERCEPTED DATA</p>
                        <h2 id="display-text" class="text-3xl font-bold tracking-widest uppercase">WAITING...</h2>
                        <div id="clue-dots" class="flex justify-center gap-2 mt-4"></div>
                    </div>
                </div>
            </div>

            <div class="col-span-3 glass rounded-2xl p-6 flex flex-col justify-between">
                <div id="control-attacker" class="hidden space-y-4">
                    <h3 class="text-red-500 font-bold cyber-font">ATTACK MODULE</h3>
                    <input id="input-raw" type="text" placeholder="RAW TEXT" class="w-full bg-black/60 border border-white/10 p-3 rounded-lg text-sm">
                    
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="selectMethod(1)" id="m1" class="btn-m1 border py-2 rounded font-bold text-[10px] hover:bg-white/5">KEY ORDER</button>
                        <button onclick="selectMethod(2)" id="m2" class="btn-m2 border py-2 rounded font-bold text-[10px] hover:bg-white/5">ANAGRAM</button>
                        <button onclick="selectMethod(3)" id="m3" class="btn-m3 border py-2 rounded font-bold text-[10px] hover:bg-white/5">CAESAR</button>
                        <button onclick="selectMethod(4)" id="m4" class="btn-m4 border py-2 rounded font-bold text-[10px] hover:bg-white/5">ASCII</button>
                    </div>

                    <div class="p-3 bg-white/5 rounded-lg border border-white/10">
                        <p class="text-[8px] text-gray-500 mb-1 uppercase">Encrypted Result</p>
                        <p id="preview-text" class="text-xs break-all font-mono text-cyan-200">...</p>
                    </div>

                    <button onclick="submitAttack()" class="w-full py-3 bg-red-600 hover:bg-red-500 rounded-xl font-bold transition-colors">EXECUTE ATTACK</button>
                </div>

                <div id="control-defender" class="hidden space-y-4">
                    <h3 class="text-blue-500 font-bold cyber-font">DECRYPT MODULE</h3>
                    <p class="text-[10px] text-gray-400">IDENTIFY METHODS & DECODE</p>
                    
                    <div class="grid grid-cols-2 gap-2" id="defender-methods">
                        <button onclick="guessMethod(1)" class="btn-m1 border py-2 rounded font-bold text-[10px]">METHOD 1</button>
                        <button onclick="guessMethod(2)" class="btn-m2 border py-2 rounded font-bold text-[10px]">METHOD 2</button>
                        <button onclick="guessMethod(3)" class="btn-m3 border py-2 rounded font-bold text-[10px]">METHOD 3</button>
                        <button onclick="guessMethod(4)" class="btn-m4 border py-2 rounded font-bold text-[10px]">METHOD 4</button>
                    </div>

                    <input id="input-decrypt" type="text" placeholder="DECODED TEXT" class="w-full bg-black/60 border border-white/10 p-3 rounded-lg text-sm">
                    <button onclick="submitDefense()" class="w-full py-3 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold transition-colors">SUBMIT DECODE</button>
                </div>

                <div id="wait-msg" class="text-center h-full flex flex-col justify-center opacity-40">
                    <div class="animate-spin h-8 w-8 border-4 border-cyan-500 border-t-transparent rounded-full mx-auto mb-4"></div>
                    <p class="text-xs">상대방의 행동을<br>감시 중입니다...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="game-over" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center">
        <div class="max-w-md w-full glass p-10 rounded-[40px] text-center scale-up">
            <h2 class="text-4xl font-black cyber-font text-cyan-400 mb-8">OPERATION ENDED</h2>
            <div id="final-winner" class="text-2xl font-bold text-white mb-8 italic">---</div>
            <button onclick="location.reload()" class="w-full py-4 bg-white text-black font-bold rounded-2xl">RETURN TO LOBBY</button>
        </div>
    </div>

    <script>
        // --- 1. Core Logic & Variables ---
        let peer, conn, connections = {}, myId, isHost = false, roomId = "";
        let myNick = "Player", myTeam = "";
        let selectedMethods = [];
        let currentGuessMethods = [];
        
        let gameState = {
            status: 'lobby',
            round: 1,
            maxRounds: 3,
            phase: 'attacker_turn', // attacker_turn or defender_turn
            players: {},
            scores: { attacker: 0, defender: 0 },
            rawText: "",
            encryptedText: "",
            usedMethods: [],
            clueColors: [],
            timeLeft: 30,
            lastUpdate: Date.now()
        };

        // --- 2. Encryption Engine ---
        const CryptoEngine = {
            1: (t) => t.split('').reverse().join(''), // Key Order (Reverse)
            2: (t) => t.split('').sort(() => 0.5 - Math.random()).join(''), // Anagram
            3: (t) => t.split('').map(c => String.fromCharCode(c.charCodeAt(0) + 3)).join(''), // Caesar
            4: (t) => t.split('').map(c => c.charCodeAt(0)).join('-'), // ASCII
            
            encrypt: (text, methods) => {
                let res = text;
                methods.forEach(m => { res = CryptoEngine[m](res); });
                return res;
            }
        };

        // --- 3. P2P Networking ---
        document.getElementById('btn-enter').addEventListener('click', () => {
            myNick = document.getElementById('user-nick').value || "Guest";
            const val = document.getElementById('room-id').value.trim();
            if(!val) return alert("Room code required");
            roomId = "CRYPTO-ROOM-" + val.toUpperCase();
            initPeer();
        });

        function initPeer() {
            peer = new Peer();
            peer.on('open', id => {
                myId = id;
                const c = peer.connect(roomId);
                c.on('open', () => { conn = c; setupClient(); });
                setTimeout(() => { if(!conn) becomeHost(); }, 1000);
            });
        }

        function becomeHost() {
            isHost = true;
            if(peer) peer.destroy();
            peer = new Peer(roomId);
            peer.on('open', () => {
                updatePlayerList(myId, myNick, true);
                showGameUI();
                peer.on('connection', c => {
                    connections[c.peer] = c;
                    c.on('data', data => handleData(data, c.peer));
                });
                startHeartbeat();
            });
        }

        function setupClient() {
            conn.on('data', data => handleData(data, 'host'));
            showGameUI();
        }

        function handleData(data, sid) {
            if(data.type === 'sync') {
                gameState = data.state;
                render();
            } else if(data.type === 'draw') {
                drawFromRemote(data);
            } else if(data.type === 'join') {
                if(isHost) {
                    gameState.players[sid] = { nick: data.nick, team: Object.keys(gameState.players).length % 2 === 0 ? 'attacker' : 'defender' };
                    broadcast();
                }
            } else if(data.type === 'attack_submit' && isHost) {
                gameState.rawText = data.raw;
                gameState.encryptedText = data.enc;
                gameState.usedMethods = data.methods;
                gameState.clueColors = [...data.methods].sort(() => 0.5 - Math.random());
                gameState.phase = 'defender_turn';
                gameState.timeLeft = 45;
                broadcast();
            } else if(data.type === 'defense_submit' && isHost) {
                const isCorrect = data.text.toLowerCase() === gameState.rawText.toLowerCase() && JSON.stringify(data.methods) === JSON.stringify(gameState.usedMethods);
                if(isCorrect) {
                    gameState.scores.defender += Math.floor(gameState.timeLeft * 2);
                } else {
                    gameState.scores.attacker += 50;
                }
                nextTurn();
            }
        }

        function broadcast() {
            if(!isHost) return;
            const payload = { type: 'sync', state: gameState };
            Object.values(connections).forEach(c => c.send(payload));
            render();
        }

        // --- 4. Game Logic ---
        function showGameUI() {
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            document.getElementById('my-nick').innerText = myNick;
            if(!isHost) conn.send({ type: 'join', nick: myNick });
            initCanvas();
        }

        function selectMethod(id) {
            const idx = selectedMethods.indexOf(id);
            if(idx > -1) selectedMethods.splice(idx, 1);
            else if(selectedMethods.length < 2) selectedMethods.push(id);
            
            [1,2,3,4].forEach(m => document.getElementById(`m${m}`).classList.remove('active'));
            selectedMethods.forEach(m => document.getElementById(`m${m}`).classList.add('active'));
            
            const raw = document.getElementById('input-raw').value;
            document.getElementById('preview-text').innerText = raw ? CryptoEngine.encrypt(raw, selectedMethods) : "...";
        }

        function submitAttack() {
            const raw = document.getElementById('input-raw').value;
            if(!raw || selectedMethods.length === 0) return alert("Text and at least 1 method required");
            const enc = CryptoEngine.encrypt(raw, selectedMethods);
            const payload = { type: 'attack_submit', raw, enc, methods: selectedMethods };
            if(isHost) handleData(payload, myId); else conn.send(payload);
            selectedMethods = [];
        }

        function guessMethod(id) {
            const btn = document.querySelector(`#defender-methods .btn-m${id}`);
            if(currentGuessMethods.includes(id)) {
                currentGuessMethods = currentGuessMethods.filter(m => m !== id);
                btn.classList.remove('active');
            } else if(currentGuessMethods.length < 2) {
                currentGuessMethods.push(id);
                btn.classList.add('active');
            }
        }

        function submitDefense() {
            const text = document.getElementById('input-decrypt').value;
            const payload = { type: 'defense_submit', text, methods: currentGuessMethods };
            if(isHost) handleData(payload, myId); else conn.send(payload);
            currentGuessMethods = [];
            document.querySelectorAll('#defender-methods button').forEach(b => b.classList.remove('active'));
        }

        function nextTurn() {
            gameState.phase = 'attacker_turn';
            gameState.timeLeft = 30;
            gameState.round++;
            if(gameState.round > gameState.maxRounds * 2) {
                gameState.status = 'finished';
            }
            broadcast();
        }

        function startHeartbeat() {
            setInterval(() => {
                if(isHost && gameState.status !== 'finished') {
                    gameState.timeLeft--;
                    if(gameState.timeLeft <= 0) nextTurn();
                    broadcast();
                }
            }, 1000);
        }

        // --- 5. UI Rendering ---
        function render() {
            document.getElementById('score-attack').innerText = gameState.scores.attacker;
            document.getElementById('score-defense').innerText = gameState.scores.defender;
            document.getElementById('timer-display').innerText = `00:${gameState.timeLeft.toString().padStart(2,'0')}`;
            document.getElementById('round-info').innerText = `PHASE ${gameState.round} / ${gameState.maxRounds * 2}`;
            
            const me = isHost ? {team: 'attacker'} : (gameState.players[myId] || {team: 'observer'});
            myTeam = me.team;
            document.getElementById('my-role').innerText = myTeam;
            document.getElementById('role-indicator').className = `w-3 h-3 rounded-full ${myTeam === 'attacker' ? 'bg-red-500' : 'bg-blue-500'}`;

            // Phase UI
            const isMyTurn = (gameState.phase === 'attacker_turn' && myTeam === 'attacker') || (gameState.phase === 'defender_turn' && myTeam === 'defender');
            document.getElementById('control-attacker').classList.toggle('hidden', !(gameState.phase === 'attacker_turn' && myTeam === 'attacker'));
            document.getElementById('control-defender').classList.toggle('hidden', !(gameState.phase === 'defender_turn' && myTeam === 'defender'));
            document.getElementById('wait-msg').classList.toggle('hidden', isMyTurn);

            // Display Message
            const display = document.getElementById('display-text');
            const clueArea = document.getElementById('clue-dots');
            clueArea.innerHTML = "";
            
            if(gameState.phase === 'attacker_turn') {
                display.innerText = "WAITING FOR ATTACK...";
                display.classList.add('opacity-20');
            } else {
                display.innerText = gameState.encryptedText;
                display.classList.remove('opacity-20');
                gameState.clueColors.forEach(cid => {
                    const dot = document.createElement('div');
                    dot.className = `w-4 h-4 rounded-full bg-m${cid} shadow-lg`;
                    dot.style.backgroundColor = `var(--m${cid})`;
                    clueArea.appendChild(dot);
                });
            }

            // Player List
            const list = document.getElementById('player-list');
            list.innerHTML = "";
            Object.entries(gameState.players).forEach(([id, p]) => {
                const item = document.createElement('div');
                item.className = "flex justify-between items-center bg-white/5 p-2 rounded";
                item.innerHTML = `<span class="truncate">${p.nick}</span> <span class="text-[8px] uppercase ${p.team==='attacker'?'text-red-400':'text-blue-400'}">${p.team}</span>`;
                list.appendChild(item);
            });

            if(gameState.status === 'finished') {
                document.getElementById('game-over').classList.remove('hidden');
                const win = gameState.scores.attacker > gameState.scores.defender ? "ATTACKERS PREVAILED" : "DEFENDERS SECURED";
                document.getElementById('final-winner').innerText = win;
            }
        }

        // --- 6. Shared Canvas (Anti-Boredom) ---
        let canvas, ctx, drawing = false, tool = 'draw';
        function initCanvas() {
            canvas = document.getElementById('shared-canvas');
            ctx = canvas.getContext('2d');
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            canvas.addEventListener('mousedown', startDraw);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDraw);
        }

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }

        function setTool(t) { tool = t; }
        function clearCanvas() { ctx.clearRect(0,0,canvas.width,canvas.height); }

        function startDraw(e) { drawing = true; draw(e); }
        function stopDraw() { drawing = false; ctx.beginPath(); }
        
        function draw(e) {
            if(!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const drawData = { type: 'draw', x, y, tool, color: myTeam === 'attacker' ? '#ef4444' : '#3b82f6' };
            drawFromRemote(drawData);
            
            if(isHost) broadcastDraw(drawData);
            else conn.send(drawData);
        }

        function drawFromRemote(data) {
            ctx.lineWidth = data.tool === 'erase' ? 20 : 2;
            ctx.lineCap = 'round';
            ctx.strokeStyle = data.tool === 'erase' ? '#0d0d15' : data.color;
            ctx.globalCompositeOperation = data.tool === 'erase' ? 'destination-out' : 'source-over';
            
            ctx.lineTo(data.x, data.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(data.x, data.y);
        }

        function broadcastDraw(data) {
            Object.values(connections).forEach(c => c.send(data));
        }

        function updatePlayerList(id, nick, host = false) {
            gameState.players[id] = { nick, team: host ? 'attacker' : 'observer' };
        }
    </script>
</body>
</html>
